# ============================================================
# SEMA (Self-Expansion with Mixture of Adapters) 配置文件
# ============================================================
# 对应论文: CVPR 2025 - Self-Expansion of Pre-trained Models
#            with Mixture of Adapters for Continual Learning
# ============================================================

# ---- 数据集配置 ----
dataset: cifar100           # 数据集: cifar100, imagenetr, imageneta, vtab
init_cls: 10                # 第一个任务的类别数
increment: 10               # 后续每个任务新增的类别数
shuffle: true               # 是否打乱类别顺序

# ---- 模型配置 ----
model_name: sema            # 模型名称（用于日志和检查点）
backbone_type: pretrained_vit_b16_224_adapter  # 主干网络类型

# ---- SEMA 核心参数 ----
# 适配器配置
ffn_adapter_type: adaptmlp
ffn_num: 16                 # 适配器瓶颈维度（越小参数越少）
ffn_adapter_init_option: lora
ffn_adapter_scalar: 1.0
ffn_adapter_layernorm_option: none

# 扩展检测配置
adapt_start_layer: 9        # 扩展检测的起始层（浅层不检测）
adapt_end_layer: 11         # 扩展检测的结束层（ViT-B/16 共 12 层）
rd_dim: 128                 # 表征描述器的压缩维度
exp_threshold: 2            # Z-score 扩展阈值（越高越不容易扩展）
buffer_size: 500            # 重建误差的缓冲区大小

# ---- 训练配置 ----
seed: [1993]                # 随机种子
device: [auto]              # 设备: [auto]=自动选空闲最大的GPU, [0]=指定GPU0
batch_size: 32              # 训练 batch size
detect_batch_size: 128      # 扩展检测时的 batch size
optimizer: sgd              # 优化器: sgd, adam
init_lr: 0.005              # 功能适配器的初始学习率
rd_lr: 0.01                 # 表征描述器的学习率
weight_decay: 0.0005
min_lr: 0                   # 最小学习率
func_epoch: 5               # func 阶段训练 epoch 数
rd_epoch: 20                # rd 阶段训练 epoch 数
num_workers: 8

# ---- 内存与 VPT 配置 ----
memory_size: 0              # 回放内存大小（SEMA 使用 0，即不回放）
memory_per_class: 0
fixed_memory: false
vpt_type: shallow           # VPT 类型（SEMA 一般不使用 VPT）
prompt_token_num: 5         # Prompt token 数量
prefix: reproduce           # 实验前缀（用于日志和检查点路径）

# ---- wandb 配置 ----
wandb:
  mode: online                 # online / offline / disabled
  project: LiF-CL
  tags: [sema, lif-cl]

# ---- 其他 ----
eval: false                 # true = 只评估，false = 训练+评估
# resume: true              # 取消注释以从检查点恢复
# checkpoint_dir: checkpoints/sema/cifar100/reproduce_1993  # 检查点路径
