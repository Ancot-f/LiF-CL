# ═══════════════════════════════════════════════════════════════════════════
# Sparse Geometry-Aware MoE — ImageNet-A (AdamW, B20 Inc20, 10 tasks)
# 用法:   python main.py --config configs/bundle_sema/sparse_geo_moe_ina_adam.yaml
# ═══════════════════════════════════════════════════════════════════════════

prefix: reproduce
model_name: sparse_geo_moe

dataset: imageneta
init_cls: 10
increment: 10
shuffle: true

backbone_type: pretrained_vit_b16_224_adapter

device: auto
seed: [1993]
batch_size: 32

# ── SGD (better for small datasets like INA) ──
optimizer: sgd
init_lr: 0.005
rd_lr: 0.01
weight_decay: 0.0005
min_lr: 0

func_epoch: 20
rd_epoch: 20

ffn_num: 32
ffn_adapter_type: adaptmlp

rd_dim: 12
buffer_size: 500

exp_threshold: 0.8
adapt_start_layer: 9
adapt_end_layer: 11
detect_batch_size: 64
expansion_patience: 3

num_geo_groups: 4
sparse_top_k: 2
router_beta: 0.1
router_tau: 1.0

mamba_d_state: 16
mamba_d_conv: 4
mamba_expand: 2

use_group_pos: false
num_groups: 4
group_pos_scale: 0.1
use_lie_group_pos: false

lambda_geo_rd: 0.1
lambda_sem: 0.01
beta_router: 0.01

memory_size: 0
memory_per_class: 0
fixed_memory: false

vpt_type: shallow
prompt_token_num: 5

wandb:
  mode: online
  project: LiF-CL
  tags: [sparse_geo_moe, imagenet-a, adamw]
