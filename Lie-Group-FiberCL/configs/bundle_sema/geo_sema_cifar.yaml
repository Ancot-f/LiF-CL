# ═══════════════════════════════════════════════════════════════════════════════
# Geometry-SEMA (Group-MoE + Shared MambaFlow) — CIFAR-100 (B0 Inc10, 10 tasks)
#
# 架构:  固定 GroupBank (Identity, SO, LR, Affine) → Group-MoE → Shared MambaFlow
# 层 9-11: Group-MoE + Group-aware AE/RD 活跃
# 损失:   L_total = L_cls + lambda_geo_rd * L_geo_rd + lambda_sem * L_sem
#
# GroupBank 含 4 个群 (MambaFlow 独立于 GroupBank, 在混合后统一应用):
#   Identity, SO, LR, Affine
# 可扩展群: SO, LR, Affine
# 不可扩展: Identity, MambaFlow
#
# Usage:  python main.py --config configs/bundle_sema/geo_sema_cifar.yaml
# ═══════════════════════════════════════════════════════════════════════════════

# ── 实验标识 ──
prefix: reproduce
model_name: geo_sema

# ── 数据集 ──
dataset: cifar100
init_cls: 10
increment: 10
shuffle: true

# ── 主干网络 ──
backbone_type: pretrained_vit_b16_224_adapter

# ── 硬件 ──
device: auto
seed: [1993]
batch_size: 32
detect_batch_size: 128            # 异常检测 batch size

# ── 优化器 ──
optimizer: sgd
init_lr: 0.005                     # 功能训练学习率
rd_lr: 0.01                        # RD 训练学习率
weight_decay: 0.0005
min_lr: 0

# ── 训练阶段 ──
func_epoch: 5                      # 功能训练 epoch (CIFAR 用 5)
rd_epoch: 20                       # RD 训练 epoch

# ── 适配器配置 ──
ffn_num: 16                        # 瓶颈维度 r (所有群共享)
ffn_adapter_type: adaptmlp

# ── Geometry-MoE 扩展检测 ──
exp_threshold: 2                   # z-score 阈值 (>阈值触发扩展)
expansion_patience: 3               # 需要连续 N 个 batch 超过阈值才扩展 (section 9)
adapt_start_layer: 9               # 深层起始层
adapt_end_layer: 11                # 深层结束层
rd_dim: 128                        # AE 压缩维度
buffer_size: 500                   # 运行统计缓冲区大小

# ── Group-MoE 配置 ──
num_geo_groups: 4                  # 群数量 (Identity, SO, LR, Affine)
                                   # MambaFlow 不在此计数 (独立共享算子)
router_beta: 0.1                   # 路由器 z-score 校正强度
router_tau: 1.0                    # 路由器温度 (越小越尖锐)

# ── MambaFlow 配置 ──
mamba_d_state: 16                  # SSM 状态维度 N
mamba_d_conv: 4                    # 1D 因果卷积核大小
mamba_expand: 2                    # 内部维度扩展因子

# ── 三层损失权重 ──
# L_total = L_cls + lambda_geo_rd * L_geo_rd + lambda_sem * L_sem
lambda_geo_rd: 0.1                 # 几何-RD 损失权重
lambda_sem: 0.01                   # 语义保持损失权重
beta_router: 0.01                  # L_sem 内路由一致性权重

# ── L_geo_rd 内部自适应权重 (section 12) ──
# alpha_rd = clip(1 + gamma_z * z_norm, alpha_rd_min, alpha_rd_max)
alpha_rd: 1.0                      # 群 RD 损失基础权重
alpha_rd_min: 0.1
alpha_rd_max: 10.0
# alpha_geo = clip(alpha0 * (1 + gamma_o * orth_error), min, max)
alpha_geo: 0.1                     # SO 正交约束基础权重
alpha_geo_min: 0.01
alpha_geo_max: 1.0
# alpha_bal = clip(alpha0 * (1 + gamma_u * usage_imbalance), min, max)
alpha_bal: 0.01                    # 路由平衡基础权重
alpha_bal_min: 0.001
alpha_bal_max: 0.1
# 自适应调节系数
gamma_z: 0.5                       # z-score 调节系数
gamma_o: 1.0                       # 正交误差调节系数
gamma_u: 1.0                       # 使用不平衡调节系数

# ── 回放内存 (不使用回放) ──
memory_size: 0
memory_per_class: 0
fixed_memory: false

# ── VPT (不使用 Prompt) ──
vpt_type: shallow
prompt_token_num: 5

# ── Group-Structured Positional Routing (可选, 默认关闭) ──
use_group_pos: false               # 是否启用群结构位置路由
num_groups: 4                      # 位置群数量
group_pos_scale: 0.1               # 初始位置扰动幅度
use_lie_group_pos: false           # 是否使用 Lie 参数版本

# ── wandb ──
wandb:
  mode: online
  project: LiF-CL
  tags: [geo-sema, group-moe, mamba-flow, cifar100]
