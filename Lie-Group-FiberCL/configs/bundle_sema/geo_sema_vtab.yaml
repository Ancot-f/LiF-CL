# ═══════════════════════════════════════════════════════════════════════════════
# Geometry-SEMA (Group-MoE + Shared MambaFlow) — VTAB (B0 Inc5, 10 tasks)
#
# VTAB 包含 50 类 (5 类/任务, 10 个增量任务), 任务间差异大。
# exp_threshold 设为 1 (更低) 因为 VTAB 任务多样性高, 更易触发扩展。
#
# Usage:  python main.py --config configs/bundle_sema/geo_sema_vtab.yaml
# ═══════════════════════════════════════════════════════════════════════════════

# ── 实验标识 ──
prefix: reproduce
model_name: geo_sema

# ── 数据集 ──
dataset: vtab
init_cls: 10
increment: 10
shuffle: true

# ── 主干网络 ──
backbone_type: pretrained_vit_b16_224_adapter

# ── 硬件 ──
device: auto
seed: [1993]
batch_size: 32
detect_batch_size: 128

# ── 优化器 ──
optimizer: sgd
init_lr: 0.005
rd_lr: 0.01
weight_decay: 0.0005
min_lr: 0

# ── 训练阶段 ──
func_epoch: 20                     # VTAB 每个任务需要更多 func epoch
rd_epoch: 20

# ── 适配器配置 ──
ffn_num: 16
ffn_adapter_type: adaptmlp

# ── Geometry-MoE 扩展检测 ──
exp_threshold: 1                   # VTAB 使用更低阈值 (任务多样性高)
expansion_patience: 3               # 持续性检测: 需要连续 N batch 才触发扩展
adapt_start_layer: 9
adapt_end_layer: 11
rd_dim: 128
buffer_size: 500

# ── Group-MoE 配置 ──
num_geo_groups: 4                  # Identity, SO, LR, Affine (MambaFlow 独立)
router_beta: 0.1
router_tau: 1.0

# ── MambaFlow 配置 ──
mamba_d_state: 16
mamba_d_conv: 4
mamba_expand: 2

# ── 三层损失权重 ──
lambda_geo_rd: 0.1
lambda_sem: 0.01
beta_router: 0.01

# ── L_geo_rd 内部自适应权重 ──
alpha_rd: 1.0
alpha_rd_min: 0.1
alpha_rd_max: 10.0
alpha_geo: 0.1
alpha_geo_min: 0.01
alpha_geo_max: 1.0
alpha_bal: 0.01
alpha_bal_min: 0.001
alpha_bal_max: 0.1
gamma_z: 0.5
gamma_o: 1.0
gamma_u: 1.0

# ── 回放内存 ──
memory_size: 0
memory_per_class: 0
fixed_memory: false

# ── VPT ──
vpt_type: shallow
prompt_token_num: 5

# ── Group-Structured Positional Routing ──
use_group_pos: false
num_groups: 4
group_pos_scale: 0.1
use_lie_group_pos: false

# ── wandb ──
wandb:
  mode: online
  project: LiF-CL
  tags: [geo-sema, group-moe, mamba-flow, vtab]
