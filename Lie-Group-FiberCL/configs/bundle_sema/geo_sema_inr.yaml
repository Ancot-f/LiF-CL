# ═══════════════════════════════════════════════════════════════════════════════
# Geometry-SEMA (Group-MoE + Shared MambaFlow) — ImageNet-R (B0 Inc20, 10 tasks)
#
# Usage:         python main.py --config configs/bundle_sema/geo_sema_inr.yaml
# ═══════════════════════════════════════════════════════════════════════════════

# ── 实验标识 ──
prefix: reproduce
model_name: geo_sema

# ── 数据集 ──
dataset: imagenetr
init_cls: 20
increment: 20
shuffle: true

# ── 主干网络 ──
backbone_type: pretrained_vit_b16_224_adapter

# ── 硬件 ──
device: auto
seed: [1993]
batch_size: 32

# ── 优化器 ──
optimizer: sgd
init_lr: 0.005
rd_lr: 0.01
weight_decay: 0.0005
min_lr: 0

# ── 训练阶段 ──
func_epoch: 20                 # ImageNet-R needs more func epochs
rd_epoch: 20

# ── 适配器配置 ──
ffn_num: 16
ffn_adapter_type: adaptmlp

# ── Geometry-MoE 扩展检测 ──
exp_threshold: 2               # Z-score threshold for expert expansion
adapt_start_layer: 9
adapt_end_layer: 11
rd_dim: 128
buffer_size: 500

# ── Group-MoE 配置 ──
num_geo_groups: 5
router_beta: 0.1
router_tau: 1.0

# ── MambaFlow 配置 ──
mamba_d_state: 16
mamba_d_conv: 4
mamba_expand: 2

# ── 损失权重 ──
lambda_geo_rd: 0.1
lambda_sem: 0.01
beta_router: 0.01
alpha_rd: 1.0
alpha_geo: 0.1
alpha_bal: 0.01

# ── 回放内存 ──
memory_size: 0
memory_per_class: 0
fixed_memory: false

# ── VPT ──
vpt_type: shallow
prompt_token_num: 5

# ── Group-Structured Positional Routing ──
use_group_pos: false
num_groups: 4
group_pos_scale: 0.1
use_lie_group_pos: false

# ── wandb ──
wandb:
  mode: online
  project: LiF-CL
  tags: [geo-sema, group-moe, mamba-flow, imagenetr]
