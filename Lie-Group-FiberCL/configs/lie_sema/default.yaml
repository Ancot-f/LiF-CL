# ============================================================
# Lie-SEMA (李群纤维丛 SEMA) 配置文件
# ============================================================
# 基于 SEMA, 将 Adapter.down_proj 约束到 Stiefel 流形 St(768,16) 上,
# 用测地线距离替代 Z-score 做扩展检测.
# ============================================================

prefix: reproduce
model_name: lie_sema            # 新方法名称

# ---- 数据集 ----
dataset: cifar100
init_cls: 10
increment: 10
shuffle: true

# ---- 主干网络 ----
backbone_type: pretrained_vit_b16_224_adapter

# ---- 硬件 ----
device: auto
seed: [1993]
batch_size: 32

# ---- 优化器 ----
optimizer: sgd
init_lr: 0.005
rd_lr: 0.01
weight_decay: 0.0005
min_lr: 0

# ---- 训练阶段 ----
func_epoch: 5
rd_epoch: 20

# ---- Lie-SEMA 适配器 (Stiefel 约束) ----
ffn_num: 16
ffn_adapter_type: adaptmlp
ffn_adapter_init_option: lora
ffn_adapter_scalar: 0.1
ffn_adapter_layernorm_option: none

# ---- Lie-SEMA 表征描述器 ----
rd_dim: 128
buffer_size: 500

# ---- Lie-SEMA 扩展检测 (测地线距离) ----
exp_threshold: 2               # Z-score 阈值 (兼容保留)
geo_threshold: 0.5             # 测地线距离阈值 (Stiefel 流形上)
                               #   d_geo ∈ [0, π·√r/2] ≈ [0, 6.3]
                               #   0 = 完全相同, π/2 ≈ 1.57 = 正交
                               #   推荐: 0.3-0.8
adapt_start_layer: 9
adapt_end_layer: 11
detect_batch_size: 128

# ---- 其余 ----
memory_size: 0
memory_per_class: 0
fixed_memory: false
vpt_type: shallow
prompt_token_num: 5

wandb:
  mode: disabled
  project: LiF-CL
  tags: [lie-sema, stiefel, fiber-bundle]
