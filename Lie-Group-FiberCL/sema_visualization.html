<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEMA 自扩展适配器混合 · 精细化流程演示</title>
<style>
:root {
  --bg: #060b14;
  --panel: #0d1525;
  --panel2: #111b2e;
  --border: #1a2740;
  --border2: #243452;
  --text: #d4dbe8;
  --text2: #8fa0bc;
  --dim: #556580;
  --accent: #38bdf8;
  --accent2: #0ea5e9;
  --green: #22c55e;
  --green2: #16a34a;
  --orange: #f97316;
  --orange2: #ea580c;
  --red: #ef4444;
  --red2: #dc2626;
  --purple: #a78bfa;
  --purple2: #8b5cf6;
  --yellow: #eab308;
  --pink: #ec4899;
  --cyan: #06b6d4;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  line-height: 1.7;
  font-size: 18px;
}
.hero h1 { font-size: 3rem; }
.hero .sub { font-size: 1.25rem; }
.hero .ref { font-size: 0.95rem; }
.nav button { font-size: 0.95rem; padding: 0.55rem 1.3rem; }
.card h2 { font-size: 1.35rem; }
.card h3 { font-size: 1.1rem; }
.card p, .card li { font-size: 0.95rem; }
.vit-label { font-size: 0.8rem; width: 60px; }
.vit-bar { font-size: 0.8rem; height: 32px; }
.vit-bar .z-badge { font-size: 0.75rem; }
.vit-bar .ad-count { font-size: 0.7rem; }
.vit-legend { font-size: 0.78rem; }
.ad-card h4 { font-size: 1rem; }
.ad-card .flow { font-size: 0.75rem; }
.ad-card .desc { font-size: 0.82rem; }
.timeline .phase { font-size: 0.9rem; }
.timeline .phase .num { font-size: 1.5rem; }
.timeline .phase .tag { font-size: 0.75rem; }
.dataflow { font-size: 0.8rem; }
.gauge-val { font-size: 0.8rem; }
.gauge-tag { font-size: 0.7rem; }
.gauge-thresh-label { font-size: 0.7rem; }
.call { font-size: 0.92rem; }
.router-w { font-size: 0.78rem; height: 36px; min-width: 44px; }
.step-num { font-size: 0.9rem; width: 32px; height: 32px; }
.step-body { font-size: 0.95rem; }
.step-body .sub { font-size: 0.82rem; }
.badge { font-size: 0.78rem; }
.simple-table { font-size: 0.88rem; }
.simple-table th { font-size: 0.82rem; }
.code-block { font-size: 0.85rem; padding: 1rem 1.3rem; }

/* Hero */
.hero {
  background: radial-gradient(ellipse at 50% 0%, rgba(56,189,248,0.08) 0%, transparent 70%),
              radial-gradient(ellipse at 80% 100%, rgba(167,139,250,0.06) 0%, transparent 60%),
              var(--bg);
  padding: 3.5rem 2rem 2.5rem;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.hero h1 {
  font-size: 2.4rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, var(--accent) 0%, #7dd3fc 30%, var(--purple) 70%, #c4b5fd 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.6rem;
}
.hero .sub {
  color: var(--text2);
  font-size: 1.05rem;
  margin-bottom: 0.25rem;
}
.hero .ref {
  color: var(--dim);
  font-size: 0.82rem;
}

/* Top nav */
.nav {
  display: flex; justify-content: center; gap: 2px;
  padding: 0.6rem 1rem;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  flex-wrap: wrap;
}
.nav button {
  padding: 0.45rem 1.1rem;
  border: 1px solid transparent;
  border-radius: 7px;
  background: transparent; color: var(--dim);
  cursor: pointer; font-size: 0.82rem;
  transition: all 0.2s; white-space: nowrap;
  font-family: inherit;
}
.nav button:hover { color: var(--text); border-color: var(--border2); background: var(--panel2); }
.nav button.sel {
  color: var(--accent); background: rgba(56,189,248,0.1);
  border-color: rgba(56,189,248,0.3);
}

/* Main area */
.main {
  max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem;
}

/* Card */
.card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 14px; padding: 1.8rem; margin-bottom: 1.5rem;
}
.card h2 {
  font-size: 1.15rem; font-weight: 700; color: var(--accent);
  margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.5rem;
}
.card h3 {
  font-size: 0.95rem; font-weight: 600; color: var(--text);
  margin: 1rem 0 0.5rem;
}

/* ViT grid */
.vit-grid {
  display: flex; flex-direction: column; gap: 3px;
  position: relative; font-family: 'JetBrains Mono', 'Fira Code', monospace;
}
.vit-row {
  display: flex; align-items: center; gap: 10px;
  padding: 2px 0; position: relative;
}
.vit-label {
  width: 55px; font-size: 0.7rem; color: var(--dim); text-align: right;
  flex-shrink: 0; font-weight: 600;
}
.vit-bar {
  flex: 1; height: 28px; border-radius: 5px;
  background: var(--panel2); border: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 10px;
  font-size: 0.7rem; position: relative; overflow: visible;
  transition: all 0.4s ease;
}
.vit-bar.detect { border-left: 3px solid var(--purple); }
.vit-bar.expand { border-color: var(--accent); background: rgba(56,189,248,0.06); }
.vit-bar .z-badge {
  position: absolute; right: 8px; font-size: 0.65rem;
  font-weight: 700; font-family: 'JetBrains Mono', monospace;
}
.vit-bar .ad-count {
  position: absolute; right: 60px; font-size: 0.62rem;
  color: var(--dim); background: rgba(56,189,248,0.08);
  padding: 1px 6px; border-radius: 3px;
}
.vit-bar .layer-info {
  font-size: 0.68rem; color: var(--text2);
}
.vit-legend {
  display: flex; gap: 1.2rem; margin-top: 8px;
  font-size: 0.68rem; color: var(--dim); flex-wrap: wrap;
}
.vit-legend span { display: flex; align-items: center; gap: 4px; }
.vit-legend .swatch { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* Adapter cards */
.ad-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; margin-top: 0.5rem; }
.ad-card {
  background: var(--panel2); border: 1px solid var(--border);
  border-radius: 10px; padding: 1.2rem;
}
.ad-card h4 { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.6rem; }
.ad-card .flow {
  display: flex; align-items: center; gap: 3px; flex-wrap: wrap;
  font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
}
.ad-card .flow .node {
  border: 1px solid var(--accent); border-radius: 4px;
  padding: 2px 6px; background: rgba(56,189,248,0.06);
  text-align: center; white-space: nowrap;
}
.ad-card .flow .arrow { color: var(--dim); margin: 0 2px; }
.ad-card .desc { font-size: 0.72rem; color: var(--dim); margin-top: 0.5rem; }

/* Phase timeline */
.timeline { display: flex; gap: 0; margin: 1rem 0; }
.timeline .phase {
  flex: 1; padding: 0.8rem; text-align: center;
  border: 1px solid var(--border); font-size: 0.78rem;
  position: relative; transition: all 0.3s;
}
.timeline .phase:first-child { border-radius: 8px 0 0 8px; }
.timeline .phase:last-child { border-radius: 0 8px 8px 0; }
.timeline .phase.highlight { border-color: var(--accent); background: rgba(56,189,248,0.06); }
.timeline .phase .num { font-size: 1.3rem; font-weight: 800; }
.timeline .phase .tag { font-size: 0.65rem; color: var(--dim); margin-top: 2px; }

/* Data flow */
.dataflow {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  justify-content: center; padding: 0.8rem;
  font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
}
.dataflow .block {
  border: 1px solid var(--border2); border-radius: 6px;
  padding: 6px 10px; text-align: center;
  background: var(--panel2);
}
.dataflow .block.hl { border-color: var(--accent); background: rgba(56,189,248,0.08); }
.dataflow .arr { color: var(--dim); font-size: 1rem; }

/* Z-score gauge */
.gauge-set { display: flex; gap: 6px; align-items: flex-end; height: 130px; justify-content: center; padding: 0.5rem 0; position: relative; }
.gauge-item { display: flex; flex-direction: column; align-items: center; gap: 3px; width: 50px; }
.gauge-fill {
  width: 28px; border-radius: 4px 4px 1px 1px;
  transition: height 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
.gauge-val { font-size: 0.68rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.gauge-tag { font-size: 0.6rem; color: var(--dim); }
.gauge-thresh {
  position: absolute; left: 8%; right: 8%;
  border-top: 2px dashed var(--red);
}
.gauge-thresh-label {
  position: absolute; right: 8%; font-size: 0.6rem; color: var(--red);
  margin-top: -16px;
}

/* Callout */
.call {
  padding: 0.7rem 1rem; border-radius: 8px; font-size: 0.8rem; margin: 0.7rem 0;
  border: 1px solid;
}
.call.info { background: rgba(56,189,248,0.05); border-color: rgba(56,189,248,0.2); color: var(--text2); }
.call.warn { background: rgba(249,115,22,0.05); border-color: rgba(249,115,22,0.2); }
.call.good { background: rgba(34,197,94,0.05); border-color: rgba(34,197,94,0.2); }
.call b { color: var(--text); }

/* Router */
.router-row { display: flex; align-items: center; gap: 6px; padding: 0.5rem; justify-content: center; flex-wrap: wrap; }
.router-w {
  height: 30px; border-radius: 6px; display: flex; align-items: center;
  justify-content: center; font-size: 0.65rem; font-weight: 700;
  min-width: 36px; font-family: 'JetBrains Mono', monospace;
  transition: all 0.5s ease;
}

/* Progress */
.progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin: 1rem 0; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s; }

/* Scroll scene */
.scroll-view { max-width: 1000px; margin: 0 auto; }
.scroll-section {
  border-left: 3px solid var(--border2); margin: 0 0 0 24px;
  padding: 0 0 2rem 2rem; position: relative;
}
.scroll-section::before {
  content: ''; position: absolute; left: -11px; top: 0;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--panel); border: 3px solid var(--accent);
}
.scroll-section h3 { margin: 0 0 0.5rem; color: var(--accent); }
.scroll-section .subtitle { font-size: 0.82rem; color: var(--dim); margin-bottom: 0.8rem; }
.comp-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 0.8rem; margin: 0.5rem 0; }
.comp-card {
  background: var(--panel2); border: 1px solid var(--border);
  border-radius: 10px; padding: 1rem;
}
.comp-card h4 { font-size: 0.95rem; margin-bottom: 0.3rem; }
.comp-card .role { color: var(--dim); font-size: 0.72rem; margin-bottom: 0.5rem; }
.comp-card .content { font-size: 0.82rem; color: var(--text2); line-height: 1.7; }
.comp-card .content b { color: var(--text); }
.flow-connector {
  display: flex; align-items: center; justify-content: center;
  padding: 0.5rem 0; color: var(--accent); font-size: 1.5rem;
}
.arrow-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; justify-content: center; padding: 0.5rem; font-size: 0.75rem; }
.arrow-row .node {
  padding: 5px 10px; border-radius: 6px; text-align: center;
  font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
}
.arrow-row .n-blue { border: 1px solid var(--accent); background: rgba(56,189,248,0.08); }
.arrow-row .n-green { border: 1px solid var(--green); background: rgba(34,197,94,0.08); }
.arrow-row .n-orange { border: 1px solid var(--orange); background: rgba(249,115,22,0.08); }
.arrow-row .n-purple { border: 1px solid var(--purple); background: rgba(167,139,250,0.08); }
.arrow-row .arr { color: var(--dim); font-weight: 700; }

/* Two-col */

.cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media (max-width: 768px) { .cols { grid-template-columns: 1fr; } }

/* Code block */
.code-block {
  background: rgba(0,0,0,0.5); border-radius: 10px;
  border: 1px solid var(--border2);
  padding: 1rem 1.3rem; font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 0.85rem; color: #c9d1d9; line-height: 1.9;
  overflow-x: auto; white-space: pre;
  tab-size: 4;
}
.code-block .kw { color: var(--purple); }
.code-block .fn { color: var(--accent); }
.code-block .cmt { color: var(--dim); font-style: italic; }
.code-block .num { color: var(--orange); }
.code-block .str { color: var(--green); }

/* Step */
.step-row { display: flex; gap: 0.8rem; align-items: flex-start; margin-bottom: 0.6rem; }
.step-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--border); display: flex; align-items: center;
  justify-content: center; font-size: 0.75rem; font-weight: 700;
  flex-shrink: 0; color: var(--dim);
}
.step-num.done { background: rgba(34,197,94,0.15); color: var(--green); }
.step-num.cur { background: rgba(56,189,248,0.15); color: var(--accent); animation: glow2 1.5s infinite; }
.step-body { font-size: 0.82rem; padding-top: 2px; }
.step-body .main { color: var(--text); }
.step-body .sub { color: var(--dim); font-size: 0.72rem; }

@keyframes glow2 {
  0%,100% { box-shadow: 0 0 0 rgba(56,189,248,0); }
  50% { box-shadow: 0 0 12px rgba(56,189,248,0.3); }
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.anim-in { animation: fadeSlide 0.4s ease both; }

/* Counter badge */
.badge {
  display: inline-block; padding: 1px 7px; border-radius: 999px;
  font-size: 0.7rem; font-weight: 600;
}
.badge.blue { background: rgba(56,189,248,0.12); color: var(--accent); }
.badge.green { background: rgba(34,197,94,0.12); color: var(--green); }
.badge.red { background: rgba(239,68,68,0.12); color: var(--red); }
.badge.purple { background: rgba(167,139,250,0.12); color: var(--purple); }

/* Table */
.simple-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin: 0.8rem 0; }
.simple-table th { text-align: left; padding: 6px 10px; color: var(--dim); font-weight: 600; font-size: 0.7rem; border-bottom: 1px solid var(--border); }
.simple-table td { padding: 6px 10px; border-bottom: 1px solid rgba(26,39,64,0.5); }
.simple-table tr:hover td { background: rgba(56,189,248,0.03); }
</style>
</head>
<body>

<div class="hero">
  <h1>SEMA · Self-Expansion with Mixture of Adapters</h1>
  <div class="sub">自扩展适配器混合 — 持续学习全流程精细化交互演示</div>
  <div class="ref">CVPR 2025 | 预训练 ViT + 参数高效微调 | 子线性增长 · 零遗忘 · 软路由</div>
</div>

<nav class="nav" id="nav">
  <button data-to="0" class="sel">1. 架构总览</button>
  <button data-to="1">2. Task 0 初始训练</button>
  <button data-to="2">3. func 阶段详解</button>
  <button data-to="3">4. rd 阶段详解</button>
  <button data-to="4">5. 冻结与隔离</button>
  <button data-to="5">6. 扩展检测 (Z-score)</button>
  <button data-to="6">7. 触发扩展</button>
  <button data-to="7">8. 软路由组合</button>
  <button data-to="8">9. 多任务演示</button>
  <button data-to="9">10. 总结对比</button>
  <button data-to="10">11. 全流程长卷轴</button>
</nav>

<div class="main" id="main"></div>

<script>
// ── State ──
let cur = 0;
let timers = [];

function clr() { timers.forEach(clearTimeout); timers = []; }

// ── Helpers ──
function E(tag, attrs={}, ...kids) {
  const svgTags = ['svg','rect','text','line','g','defs','linearGradient','stop','marker','polygon','circle','path','ellipse','tspan'];
  const isSvg = svgTags.includes(tag);
  const el = isSvg
    ? document.createElementNS('http://www.w3.org/2000/svg', tag)
    : document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2), v);
    else if (k === 'cls') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else el.setAttribute(k, v);
  }
  kids.forEach(c => {
    if (c == null) return;
    if (typeof c === 'string' || typeof c === 'number') el.appendChild(document.createTextNode(String(c)));
    else if (c instanceof Node) el.appendChild(c);
  });
  return el;
}

function vitRow(i, opts={}) {
  const isDetect = i >= (opts.dStart??9) && i <= (opts.dEnd??11);
  const n = (opts.counts||[])[i] || 1;
  const z = (opts.zs||[])[i] || 0;
  const th = opts.thresh ?? 2;
  const lbl = E('span', {cls:'vit-label'}, `L${i}`);
  const cls = ['vit-bar'];
  if (isDetect) cls.push('detect');
  if (opts.highlight === i) cls.push('expand');
  const bar = E('div', {cls: cls.join(' ')},
    E('span', {cls:'layer-info'}, isDetect ? '检测层' : ''),
  );
  if (isDetect && n > 1) bar.appendChild(E('span', {cls:'ad-count'}, `${n} Ad`));
  if (isDetect && z > 0) {
    const zc = z > th ? 'var(--red)' : z > th*0.75 ? 'var(--yellow)' : 'var(--green)';
    bar.appendChild(E('span', {cls:'z-badge', style:{color:zc}}, `Z=${z.toFixed(1)}`));
  }
  return E('div', {cls:'vit-row'}, lbl, bar);
}

function vitDiagram(opts={}) {
  const rows = Array.from({length:12}, (_,i) => vitRow(i, opts));
  rows.push(E('div', {cls:'vit-legend'},
    E('span', {}, E('span', {cls:'swatch', style:{background:'var(--purple)'}}), 'L9-L11 检测层 (可触发扩展)'),
    E('span', {}, E('span', {cls:'swatch', style:{background:'var(--border)'}}), 'L0-L8 标准层 (不检测)'),
    E('span', {}, E('span', {cls:'swatch', style:{background:'var(--accent)'}}), '含多个 Adapter'),
  ));
  return E('div', {cls:'vit-grid'}, ...rows);
}

function phaseBox(type, title, desc, badge) {
  const map = {func:'var(--orange)', rd:'var(--green)', freeze:'var(--purple)', detect:'var(--accent)'};
  return E('div', {style:{borderLeft:`3px solid ${map[type]||'var(--border)'}`,padding:'0.5rem 1rem',margin:'0.5rem 0',background:'var(--panel2)',borderRadius:'0 6px 6px 0'}},
    E('div', {style:{display:'flex',alignItems:'center',gap:'0.5rem',marginBottom:'0.2rem'}},
      E('strong', {}, title),
      badge ? E('span', {cls:`badge ${badge}`}, badge) : null,
    ),
    E('div', {style:{fontSize:'0.78rem',color:'var(--text2)'}}, desc),
  );
}

function callout(type, html) {
  const m = {info:'info', warn:'warn', good:'good'};
  return E('div', {cls:`call ${m[type]||'info'}`, html});
}

function stepRow(n, status, main, sub) {
  return E('div', {cls:'step-row anim-in', style:{animationDelay:`${n*0.15}s`}},
    E('span', {cls:`step-num ${status}`}, n),
    E('span', {cls:'step-body'},
      E('span', {cls:'main'}, main),
      sub ? E('br') : null,
      sub ? E('span', {cls:'sub'}, sub) : null,
    ),
  );
}

function codeBlock(text) {
  // 1. First escape HTML entities so <, >, & display correctly
  text = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  // 2. Then apply syntax highlighting
  const hl = text
    .replace(/(def |class |for |if |return|import |from )/g, '<span class="kw">$1</span>')
    .replace(/(_train_new|_detect_outlier|_init_train|add_adapter|end_of_task_training|freeze_functional|freeze_rd|fix_router|incremental_train|forward_features|compute_reconstruction_loss)/g, '<span class="fn">$1</span>')
    .replace(/(#.*)/g, '<span class="cmt">$1</span>')
    .replace(/(\d+\.?\d*)(?=[,\s)])/g, '<span class="num">$1</span>')
    .replace(/(\".*?\")/g, '<span class="str">$1</span>');
  return E('div', {cls:'code-block', html: hl});
}

// ── Scenes ──

function scene0() {
  return [
    E('div', {cls:'card'},
      E('h2', {}, '🏗️ 1. SEMA 整体架构'),
      E('p', {style:{fontSize:'0.85rem',color:'var(--text2)',marginBottom:'1rem'}},
        'SEMA 在冻结的预训练 ViT-B/16 每个 Block 中嵌入 <b style="color:var(--accent)">SEMAModules</b>。'
        + '每个 SEMAModules 维护一组 Adapter (初始 1 个)，深层 (L9-L11) 具备<b style="color:var(--purple)">自扩展检测</b>能力。'

function renderDemo(step) {
  const area = document.getElementById('demo-area');
  if (!area) return;
  const s = demoSteps[Math.min(step, demoSteps.length-1)];
  area.innerHTML = '';
  area.appendChild(E('div', {style:{display:'flex',alignItems:'center',gap:'0.75rem',marginBottom:'0.5rem'}},
    E('span', {cls:`badge ${s.cls==='good'?'green':s.cls==='warn'?'red':'blue'}`}, `Step ${step+1}/${demoSteps.length}`),
    E('strong', {style:{fontSize:'0.95rem'}}, `Task ${s.task}: ${s.stage}`),
  ));
  area.appendChild(E('p', {style:{fontSize:'0.78rem',color:'var(--text2)',marginBottom:'0.8rem'}}, s.info));
  area.appendChild(vitDiagram({counts:s.counts, dStart:9, dEnd:11, highlight:s.highlight, zs:s.zs}));
  const pct = ((step+1)/demoSteps.length*100).toFixed(0);
  const progBar = document.getElementById('demo-prog');
  if (progBar) progBar.style.width = pct+'%';
}

function runDemo() {
  clr();
  let step = 0;
  renderDemo(step);
  function next() {
    step++;
    if (step < demoSteps.length) {
      renderDemo(step);
      timers.push(setTimeout(next, 2500));
    } else {
      const area = document.getElementById('demo-area');
      if (area) area.appendChild(callout('good',
        '<b>🎉 5 个任务完成!</b> 仅新增 2 个 Adapter (L9, L10)。参数增长 +17% vs 线性增长 +42%。<br>'
        + '<b>零遗忘</b>: 旧 Adapter 被冻结, 旧任务性能不变。<br>'
        + '<b>知识复用</b>: Task 3/4 未触发扩展, 软路由自动调整已有 Adapter 的激活权重。'));
    }
  }
  timers.push(setTimeout(next, 2500));
}

const scenes = [scene0,scene1,scene2,scene3,scene4,scene5,scene6,scene7,scene8,scene9,scene10];

function render(n) {
  cur = n;
  clr();
  const main = document.getElementById('main');
  main.innerHTML = '';
  const cards = scenes[n]();
  cards.forEach((c,i) => { c.classList.add('anim-in'); c.style.animationDelay = `${i*0.1}s`; main.appendChild(c); });
  document.querySelectorAll('#nav button').forEach((b,i) => b.classList.toggle('sel', i===n));
  main.scrollIntoView({behavior:'smooth',block:'start'});
  if (n===8) renderDemo(0);
}

document.querySelectorAll('#nav button').forEach((btn,i) => {
  btn.addEventListener('click', () => render(i));
});

// Init
render(0);

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' && cur < scenes.length-1) render(cur+1);
  else if (e.key === 'ArrowLeft' && cur > 0) render(cur-1);
});
